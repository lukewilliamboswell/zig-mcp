name: CI

on:
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2.0.5
        with:
          version: 0.15.2

      - name: Run tests
        run: zig build test

      - name: Build
        run: zig build
